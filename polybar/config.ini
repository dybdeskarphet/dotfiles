;  _. _ | _ ._. __
; (_.(_)|(_)[  _) 
; 
[colors]
background = #000000
foreground = #ffffff
theme = #a7a0b9
alerted = #ff7171

; ._ _  _.*._ 
; [ | )(_]|[ )
; 
[bar/<your username>]
override-redirect = true
wm-restack = bspwm
bottom = false
fixed-center = true
radius-top = 25.0
line-size = 2
locale = tr_TR.UTF-8

separator = ""
separator-padding = 2
separator-foreground = ${colors.theme}

width = 85%
height = 24
offset-x = 144
offset-y = 0
padding-left = 5
padding-right = 4
module-margin-left = 0
module-margin-right = 0
tray-position = right
tray-detached = false
enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = proportional_font:style=Regular:size=10;3
font-1 = monospace_alt_font:style=Regular:size=10;3

modules-left = date battery cpu memory coretemp network
modules-center = title
modules-right = xkeyboard pulseaudio backlight bspwm

dim-value = 1.0

scroll-up = bspc desktop -f prev.local
scroll-down = bspc desktop -f next.local
cursor-click = pointer
cursor-scroll = ns-resize

; .      ,  ,          
; |_  _.-+--+- _ ._.  .
; [_)(_] |  | (/,[  \_|
;                   ._|
;
[module/battery]
type = internal/battery

full-at = 99
battery = BAT0
adapter = AC0
poll-interval = 5

format-charging = %{A1:notify-polybar battery:}<animation-charging> <label-charging>%{A}
format-discharging = %{A1:notify-polybar battery:}<ramp-capacity> <label-discharging>%{A}
format-full = %{A1:notify-polybar battery:}<ramp-capacity> <label-full>%{A}

label-charging = %percentage%%
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}
label-charging-foreground = ${colors.foreground}
label-full = 100%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-foreground = ${colors.theme}

bar-capacity-width = 10

animation-charging-0 = 
animation-charging-foreground = ${colors.theme}
animation-charging-framerate = 1000

; .                   
; |_  __._ .    ,._ _ 
; [_)_) [_) \/\/ [ | )
;       |             
; 
[module/bspwm]
type = internal/bspwm

format = <label-state> <label-mode>
enable-click = true
enable-scroll = true
reverse-scroll = true
fuzzy-match = true

label-focused = "  %name%  "
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.theme}
label-occupied = "  %name%  "
label-urgent = "  %name%  "
label-urgent-underline = ${colors.alerted}
label-empty = ""

; label-monocle = M
; label-tiled = T
; label-fullscreen = F
; label-floating = f
; label-pseudotiled = P

;   .    ,    
;  _| _.-+- _ 
; (_](_] | (/,
; 
[module/date]
type = internal/date

interval = 5.0
label = %{A3:notify-polybar date:}%time% %date%%{A}
label-font = 3
label-foreground = ${colors.foreground}

time = %H:%M
date-alt = %A %{F#a7a0b9}%{F#ffffff} %d %B %Y
time-alt = %H:%M:%S %{F#a7a0b9}%{F#ffffff}

; ._ _  _ ._ _  _ ._.  .
; [ | )(/,[ | )(_)[  \_|
;                    ._|
; 
[module/memory]
type = internal/memory
interval = 3
format-foreground = ${colors.theme}
format =   <label> 
label-foreground = ${colors.foreground}
label = %{A1:notify-polybar htop_mem:}%percentage_used%%%{A}

;  _.._ . .
; (_.[_)(_|
;    |
;
[module/cpu]
type = internal/cpu
interval = 3

format =   <label> 
format-foreground = ${colors.theme}
label = %{A1:notify-polybar htop_cpu:}%percentage%%%{A}
label-foreground = ${colors.foreground}

;        ,             .  
; ._  _ -+-.    , _ ._.;_/
; [ )(/, |  \/\/ (_)[  | \
; 
[module/network]
type = internal/network
interface = wlp2s0
interval = 4.0
udspeed-minwidth = 5
accumulate-stats = true
unknown-as-up = true

format-connected = 直<label-connected>
format-connected-foreground = ${colors.theme}
label-connected = %{A1:notify-polybar network_info:}%downspeed% %{F#a7a0b9}%{F#ffffff}%upspeed% %{F#a7a0b9}%{F#ffffff}%{A}
label-connected-foreground = ${colors.foreground}

format-disconnected = 睊  <label-disconnected>
format-disconnected-foreground = ${colors.theme}
label-disconnected = %{A1:notify-polybar wifi_menu:}bağlı değil%{A}
label-disconnected-foreground = ${colors.foreground}

;    .        .             .
; \./;_/ _   .|_  _  _.._. _|
; /'\| \(/,\_|[_)(_)(_][  (_]
;          ._|               
; 
[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

; Available tags:
;   <label-layout> (default)
;   <label-indicator> (default)
format =    <label-layout> <label-indicator>    
format-spacing = 0
format-foreground = ${colors.theme}

; Available tokens:
;   %layout%
;   %name%
;   %number%
;   %icon%
;   %variant% (New in version 3.6.0)
; Default: %layout%
label-layout = %layout%
label-layout-padding = 0
label-layout-background = ${colors.background}
label-layout-foreground = ${colors.foreground}

label-indicator-on-capslock = "%{F#a7a0b9}%{F#ff7171}  %{A1:xdotool key Caps_Lock:} capslock%{A}"
label-indicator-on-capslock-foreground = ${colors.alerted}
label-indicator-off-capslock = 

;  ,   , .   
; -+-*-+-| _ 
;  | | | |(/,
;
[module/title]
type = internal/xwindow

format = <label>
format-foreground = ${colors.foreground}
format-padding = 4
label = %title%
label-maxlen = 50

;  ,                      ,          
; -+- _ ._ _ ._  _ ._. _.-+-. .._. _ 
;  | (/,[ | )[_)(/,[  (_] | (_|[  (/,
;            |                       
; 
[module/coretemp]
type = internal/temperature
interval = 3
thermal-zone = 0
;
; NOTE: Run the command below and change the hwmon-path according to the output.
; (Don't forget to delete the semicolon)
;
; for i in /sys/class/hwmon/hwmon*/temp*_input; do    echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $i"; done
;
hwmon-path =
base-temperature = 20
warn-temperature = 90
units = true

format =  <label>
format-foreground = ${colors.theme}
format-warn =  <label-warn>
format-warn-foreground = ${colors.alerted}

label = %{A1:notify-polybar temp:}%temperature-c%%{A}
label-foreground = ${colors.foreground}
label-warn = %{A1:notify-polybar temp:}%temperature-c%%{A}
label-warn-foreground = ${colors.alerted}

;       .              .    
; ._ . .| __ _  _.. . _|* _ 
; [_)(_||_) (/,(_](_|(_]|(_)
; |                         
; 
[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_04_00.6.analog-stereo
use-ui-max = false
interval = 5

label-volume = %percentage%%
ramp-volume-0 = 奄
ramp-volume-1 = 奔
ramp-volume-2 = 墳

format-volume = <ramp-volume>  <label-volume>
ramp-volume-foreground = ${colors.theme}
ramp-volume-background = ${colors.background}
format-muted = <label-muted>

label-muted = 婢  sessiz
label-muted-foreground = #808080

; .        .  .    .   , 
; |_  _. _.;_/|* _ |_ -+-
; [_)(_](_.| \||(_][ ) | 
;               ._|      
; 
[module/backlight]
type = internal/backlight
card = amdgpu_bl0
use-actual-brightness = true
enable-scroll = true

format = <ramp>  <label>
format-foreground = ${colors.theme}
label = %percentage%%
label-foreground = ${colors.foreground}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 

;      , .     .  
;  _ *-+-|_ . .|_ 
; (_]| | [ )(_|[_)
; ._|             
; 
[module/github]
type = internal/github
token =
user = github_user
empty-notifications = true
interval = 100

format =    <label>
format-foreground = ${colors.theme}

label = %notifications%
label-foreground = ${colors.foreground}

format-offline = <label-offline>
label-offline =   Offline
label-offline-foreground = #808080
