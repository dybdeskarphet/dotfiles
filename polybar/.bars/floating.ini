[colors]
background = #0f0b0a
foreground = #ffffff
theme = #b47856
alerted = #ff7171

; ._ _  _.*._ 
; [ | )(_]|[ )
; 
[bar/<your username>]
override-redirect = true
wm-restack = bspwm
bottom = false
fixed-center = true
radius = 10.0
line-size = 2
locale = tr_TR.UTF-8

separator = ""
separator-padding = 2
separator-foreground = ${colors.theme}

width = 99%
height = 24
offset-x = 10
offset-y = 6
padding-left = 3
padding-right = 2
module-margin-left = 0
module-margin-right = 0
tray-position = right
tray-detached = false
enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = Readex Pro:style=Regular:size=10;3
font-1 = JetBrainsMono Nerd Font:style=Regular:size=9;3

modules-left = date battery cpu memory coretemp network
modules-center = title
modules-right = pulseaudio backlight bspwm

dim-value = 1.0

scroll-up = bspc desktop -f prev.local
scroll-down = bspc desktop -f next.local
cursor-click = pointer
cursor-scroll = ns-resize

; .      ,  ,          
; |_  _.-+--+- _ ._.  .
; [_)(_] |  | (/,[  \_|
;                   ._|
;
[module/battery]
type = internal/battery

full-at = 99
battery = BAT0
adapter = AC0
poll-interval = 5

format-charging = %{A1:bash -c "dunstify -i tux -t 10000 'battery details' '$(acpi -b)'":}<animation-charging> <label-charging>%{A}
format-discharging = %{A1:bash -c "dunstify -i tux -t 10000 'battery details' '$(acpi -b)'":}<ramp-capacity> <label-discharging>%{A}
format-full = %{A1:bash -c "dunstify -i tux -t 10000 'battery details' '$(acpi -b)'":}<ramp-capacity> <label-full>%{A}

label-charging = %percentage%%
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}
label-charging-foreground = ${colors.foreground}
label-full = 100%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-foreground = ${colors.theme}

bar-capacity-width = 10

animation-charging-0 = 
animation-charging-foreground = ${colors.theme}
animation-charging-framerate = 1000

; .                   
; |_  __._ .    ,._ _ 
; [_)_) [_) \/\/ [ | )
;       |             
; 
[module/bspwm]
type = internal/bspwm

format = <label-state> <label-mode>
enable-click = true
enable-scroll = true
reverse-scroll = true
fuzzy-match = true

label-focused = "  %name%  "
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.theme}
label-occupied = "  %name%  "
label-urgent = "  %name%  "
label-urgent-underline = ${colors.alerted}
label-empty = ""

; label-monocle = M
; label-tiled = T
; label-fullscreen = F
; label-floating = f
; label-pseudotiled = P

;   .    ,    
;  _| _.-+- _ 
; (_](_] | (/,
; 
[module/date]
type = internal/date

interval = 5.0
label = %{A3:bash -c "dunstify -t 10000 '$(cal && date +Bugün\ ayın\ %-d.\ günü)'":}%time% %date%%{A}
label-font = 3
label-foreground = ${colors.foreground}

time = %H:%M
date-alt = %A %{F#b47856}%{F#ffffff} %d %B %Y
time-alt = %H:%M:%S %{F#b47856}%{F#ffffff}

; ._ _  _ ._ _  _ ._.  .
; [ | )(/,[ | )(_)[  \_|
;                    ._|
; 
[module/memory]
type = internal/memory
interval = 3
format-foreground = ${colors.theme}
format =   <label> 
label-foreground = ${colors.foreground}
label = %{A1:urxvt -e bash -c "htop -t --sort-key PERCENT_MEM":}%percentage_used%%%{A}

;  _.._ . .
; (_.[_)(_|
;    |
;
[module/cpu]
type = internal/cpu
interval = 3

format =   <label> 
format-foreground = ${colors.theme}
label = %{A1:urxvt -e bash -c "htop -t --sort-key PERCENT_CPU":}%percentage%%%{A}
label-foreground = ${colors.foreground}

;        ,             .  
; ._  _ -+-.    , _ ._.;_/
; [ )(/, |  \/\/ (_)[  | \
; 
[module/network]
type = internal/network
interface = wlp2s0
interval = 4.0
udspeed-minwidth = 5
accumulate-stats = true
unknown-as-up = true

format-connected = 直<label-connected>
format-connected-foreground = ${colors.theme}
label-connected = %downspeed%
label-connected-foreground = ${colors.foreground}

format-disconnected = 睊  <label-disconnected>
format-disconnected-foreground = ${colors.theme}
label-disconnected = %{A1:urxvt -e bash -c "sudo wifi-menu; bash":}bağlı değil%{A}
label-disconnected-foreground = ${colors.foreground}

;    .        .             .
; \./;_/ _   .|_  _  _.._. _|
; /'\| \(/,\_|[_)(_)(_][  (_]
;          ._|               
; 
; [module/xkeyboard]
; type = internal/xkeyboard
; blacklist-0 = num lock
; blacklist-1 = scroll lock
; 
; format = <label-indicator>
; format-spacing = 0
; label-indicator-on-capslock =  caps lock
; label-indicator-on-capslock-foreground = ${colors.alerted}

;  ,   , .   
; -+-*-+-| _ 
;  | | | |(/,
;
[module/title]
type = internal/xwindow

format = <label>
format-foreground = ${colors.foreground}
format-padding = 4
label = %title%
label-maxlen = 50

;  ,                      ,          
; -+- _ ._ _ ._  _ ._. _.-+-. .._. _ 
;  | (/,[ | )[_)(/,[  (_] | (_|[  (/,
;            |                       
; 
[module/coretemp]
type = internal/temperature
interval = 3
thermal-zone = 0
;
; NOTE: Run the command below and change the hwmon-path according to the output.
; (Don't forget to delete the semicolon)
;
; for i in /sys/class/hwmon/hwmon*/temp*_input; do    echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $i"; done
;
hwmon-path = /sys/class/hwmon/hwmon3/temp1_input
base-temperature = 20
warn-temperature = 90
units = true
click-right = urxvt -e bash -c "sensors"

format =  <label>
format-foreground = ${colors.theme}
format-warn =  <label-warn>
format-warn-foreground = ${colors.alerted}

label = %{A1:urxvt -e bash -c "watch -p -t -n 0.5 sensors":}%temperature-c%%{A}
label-foreground = ${colors.foreground}
label-warn = %temperature-c%
label-warn-foreground = ${colors.alerted}

;       .              .    
; ._ . .| __ _  _.. . _|* _ 
; [_)(_||_) (/,(_](_|(_]|(_)
; |                         
; 
[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_04_00.6.analog-stereo
use-ui-max = false
interval = 5

label-volume = %percentage%%
ramp-volume-0 = 奄
ramp-volume-1 = 奔
ramp-volume-2 = 墳

format-volume = <ramp-volume>  <label-volume>
ramp-volume-foreground = ${colors.theme}
ramp-volume-background = ${colors.background}
format-muted = <label-muted>

label-muted = 婢  sessiz
label-muted-foreground = #808080

; .        .  .    .   , 
; |_  _. _.;_/|* _ |_ -+-
; [_)(_](_.| \||(_][ ) | 
;               ._|      
; 
[module/backlight]
type = internal/backlight
card = amdgpu_bl0
use-actual-brightness = true
enable-scroll = true

format = <ramp>  <label>
format-foreground = ${colors.theme}
label = %percentage%%
label-foreground = ${colors.foreground}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
